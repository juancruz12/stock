name: Deploy emilAI stack

on:
  push:
    branches: [ dev, preprod, main ]
    paths:
      - 'backend/**'
      - 'emilAI/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: stock-api
  ARTIFACT_REPOSITORY: cloud-run-source-deploy

jobs:
  deploy-dev:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest

    environment: dev

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure Docker Client
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        set -euo pipefail
        gcloud config set project "${{ vars.GCP_PROJECT_ID }}"

        gcloud artifacts repositories describe '${{ env.ARTIFACT_REPOSITORY }}' \
          --location='${{ env.REGION }}' \
          --project='${{ vars.GCP_PROJECT_ID }}' >/dev/null 2>&1 || \
          gcloud artifacts repositories create '${{ env.ARTIFACT_REPOSITORY }}' \
            --repository-format=docker \
            --location='${{ env.REGION }}' \
            --project='${{ vars.GCP_PROJECT_ID }}' \
            --quiet

        IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -f backend/Dockerfile -t "$IMAGE_TAG" backend
        docker push "$IMAGE_TAG"
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Package agent source
      run: |
        set -euo pipefail
        mkdir -p terraform/build
        tar -czf terraform/build/source.tar.gz -C emilAI rag requirements.txt pyproject.toml uv.lock

    - name: Terraform Apply
      run: |
        set -euo pipefail
        terraform -chdir=terraform init \
          -backend-config="bucket=emil-ai-tfstate" \
          -backend-config="prefix=terraform/state/dev"

        terraform -chdir=terraform apply -auto-approve \
          -var-file="dev.tfvars" \
          -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
          -var="db_password=${{ secrets.DB_PASSWORD }}" \
          -var="rag_corpus=${{ vars.RAG_CORPUS }}" \
          -var="image_tag=${GITHUB_SHA}"

  deploy-preprod:
    if: github.ref_name == 'preprod'
    runs-on: ubuntu-latest

    environment: preprod

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure Docker Client
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        set -euo pipefail
        gcloud config set project "${{ vars.GCP_PROJECT_ID }}"

        gcloud artifacts repositories describe '${{ env.ARTIFACT_REPOSITORY }}' \
          --location='${{ env.REGION }}' \
          --project='${{ vars.GCP_PROJECT_ID }}' >/dev/null 2>&1 || \
          gcloud artifacts repositories create '${{ env.ARTIFACT_REPOSITORY }}' \
            --repository-format=docker \
            --location='${{ env.REGION }}' \
            --project='${{ vars.GCP_PROJECT_ID }}' \
            --quiet

        IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -f backend/Dockerfile -t "$IMAGE_TAG" backend
        docker push "$IMAGE_TAG"
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Package agent source
      run: |
        set -euo pipefail
        mkdir -p terraform/build
        tar -czf terraform/build/source.tar.gz -C emilAI rag requirements.txt pyproject.toml uv.lock

    - name: Terraform Apply
      run: |
        set -euo pipefail
        terraform -chdir=terraform init \
          -backend-config="bucket=emil-ai-tfstate" \
          -backend-config="prefix=terraform/state/preprod"

        terraform -chdir=terraform apply -auto-approve \
          -var-file="preprod.tfvars" \
          -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
          -var="db_password=${{ secrets.DB_PASSWORD }}" \
          -var="rag_corpus=${{ vars.RAG_CORPUS }}" \
          -var="image_tag=${GITHUB_SHA}"

  deploy-prod:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    environment: prod

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure Docker Client
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        set -euo pipefail
        gcloud config set project "${{ vars.GCP_PROJECT_ID }}"

        gcloud artifacts repositories describe '${{ env.ARTIFACT_REPOSITORY }}' \
          --location='${{ env.REGION }}' \
          --project='${{ vars.GCP_PROJECT_ID }}' >/dev/null 2>&1 || \
          gcloud artifacts repositories create '${{ env.ARTIFACT_REPOSITORY }}' \
            --repository-format=docker \
            --location='${{ env.REGION }}' \
            --project='${{ vars.GCP_PROJECT_ID }}' \
            --quiet

        IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -f backend/Dockerfile -t "$IMAGE_TAG" backend
        docker push "$IMAGE_TAG"
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Package agent source
      run: |
        set -euo pipefail
        mkdir -p terraform/build
        tar -czf terraform/build/source.tar.gz -C emilAI rag requirements.txt pyproject.toml uv.lock

    - name: Terraform Apply
      run: |
        set -euo pipefail
        terraform -chdir=terraform init \
          -backend-config="bucket=emil-ai-tfstate" \
          -backend-config="prefix=terraform/state/prod"

        terraform -chdir=terraform apply -auto-approve \
          -var-file="prod.tfvars" \
          -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
          -var="db_password=${{ secrets.DB_PASSWORD }}" \
          -var="rag_corpus=${{ vars.RAG_CORPUS }}" \
          -var="image_tag=${GITHUB_SHA}"