name: Deploy to Cloud Run (Preprod Fix)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'      

env:
  # 1. CAMBIAMOS AL NUEVO PROYECTO REAL
  PROJECT_ID: emil-ai-preprod
  REGION: us-central1
  SERVICE_NAME: stock-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker Client
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        gcloud artifacts repositories create cloud-run-source-deploy \
          --repository-format=docker --location=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --quiet || true
        
        IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -f backend/Dockerfile -t $IMAGE_TAG backend
        docker push $IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV