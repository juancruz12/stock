name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # 👈 Se dispara automáticamente cuando commiteás cambios en la carpeta del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-east1 # 👈 Apunta a la región real de tu rag-agent
  AGENT_ID: "9007797389066502144" # 👈 El ID real de tu recurso en producción
projects/114519320182/locations/us-east1/reasoningEngines/9007797389066502144

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy Agent to Vertex AI
      env:
        COMMIT_SHA: ${{ github.sha }}
      run: |
        echo "Instalando dependencias de Vertex AI..."
        pip install --upgrade google-cloud-aiplatform

        echo "Generando script de despliegue para el Agente RAG..."
        cat << 'EOF' > deploy_agent.py
        import os
        from google.cloud import aiplatform

        PROJECT_ID = "project-76b5e515-21a1-4a89-82f"
        REGION = "us-east1"
        # La ruta completa que copiaste de la consola
        RESOURCE_NAME = "projects/114519320182/locations/us-east1/reasoningEngines/9007797389066502144"
        COMMIT_SHA = os.getenv("COMMIT_SHA", "unknown")[:7]

        print(f"Inicializando Vertex AI en {REGION}...")
        aiplatform.init(project=PROJECT_ID, location=REGION)

        print(f"Buscando Agente RAG en Agent Garden...")
        agent = aiplatform.ReasoningEngine(resource_name=RESOURCE_NAME)
        
        print(f"Actualizando componentes desde ./emilAI (asociando nueva URL de stock-api)...")
        # El SDK lee los archivos locales del agente y actualiza el recurso productivo
        # Pasamos la ruta del directorio local donde está la configuración nueva
        agent.update(local_dir="./emilAI")
        
        print(f"¡Agente RAG de Agent Garden actualizado con éxito!")
        print(f"👉 Despliegue listo en el Commit: {COMMIT_SHA}")
        EOF

        echo "Ejecutando script de despliegue..."
        python deploy_agent.py