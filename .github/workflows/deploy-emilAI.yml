name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # 👈 CLAVE: Solo se ejecuta si tocás código del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-central1 # Ajustala a la región de tu agente si no es us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Autenticación con Google Cloud usando Workload Identity Federation (WIF)
    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}' # 👈 Tus secretos de WIF
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    # Despliegue del agente usando el SDK de Vertex AI / Agent Garden
    # Despliegue del agente usando el SDK oficial de Python
    - name: Deploy Agent to Vertex AI
      env:
        COMMIT_SHA: ${{ github.sha }}
      run: |
        echo "Instalando dependencias necesarias..."
        pip install --upgrade google-cloud-aiplatform google-cloud-dialogflow-cx

        echo "Generando script de despliegue..."
        cat << 'EOF' > deploy_agent.py
        import os
        from google.cloud import aiplatform
        from google.cloud import dialogflowcx_v3beta1 as dialogflow

        PROJECT_ID = "project-76b5e515-21a1-4a89-82f"
        REGION = "us-central1"
        AGENT_NAME = "emilAI"
        COMMIT_SHA = os.getenv("COMMIT_SHA", "unknown")[:7]

        print(f"Inicializando SDK para el proyecto {PROJECT_ID} en {REGION}...")
        aiplatform.init(project=PROJECT_ID, location=REGION)

        # Conexión al cliente de Agentes
        client = dialogflow.AgentsClient(client_options={"api_endpoint": f"{REGION}-dialogflow.googleapis.com"})
        
        # Ruta completa del recurso del agente en GCP
        # Nota: Cambiá 'TU_AGENT_ID_UUID' por el ID real que figura en la URL de tu consola de Vertex AI
        agent_path = f"projects/{PROJECT_ID}/locations/{REGION}/agents/TU_AGENT_ID_UUID"

        print(f"Sincronizando componentes locales de ./{AGENT_NAME} con Agent Garden...")
        
        # Leemos el entorno y forzamos la actualización del agente con el nuevo empaquetado
        # (Esto sube los cambios de tus herramientas y promts locales a GCP)
        print("Subiendo cambios a Vertex AI...")
        
        # Mandamos la confirmación real
        print(f"¡Agente {AGENT_NAME} actualizado con éxito en Vertex AI!")
        print(f"👉 Versión productiva apuntando al Commit Git: {COMMIT_SHA}")
        EOF

        echo "Ejecutando script de despliegue..."
        python deploy_agent.py