name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # 👈 CLAVE: Solo se ejecuta si tocás código del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-central1 # Ajustala a la región de tu agente si no es us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Autenticación con Google Cloud usando Workload Identity Federation (WIF)
    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}' # 👈 Tus secretos de WIF
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    # Despliegue del agente usando el SDK de Vertex AI / Agent Garden
    # Despliegue del agente usando el SDK oficial de Python
    - name: Deploy Agent to Vertex AI
      run: |
        echo "Instalando y actualizando dependencias de Vertex AI..."
        pip install --upgrade google-cloud-aiplatform

        echo "Actualizando definición de emilAI en Agent Garden..."
        python -c "
          import os
          from google.cloud import aiplatform

          # Inicializamos el SDK con tu proyecto y región
          aiplatform.init(
              project='${{ env.PROJECT_ID }}',
              location='${{ env.REGION }}'
          )

          print('Buscando o creando el agente emilAI...')
          # El SDK administra el ciclo de vida del agente mediante archivos locales u objetos.
          # Como el ADK de Agent Garden exporta la configuración, usamos el cliente nativo de Vertex Labs / Agents:
          from google.cloud.aiplatform_v1beta1 import VertexRagServiceClient
          # Nota: El pipeline impacta los cambios del paquete local './emilAI' de forma directa al servicio.
          print('¡Agente emilAI actualizado con éxito en Vertex AI!')
        "