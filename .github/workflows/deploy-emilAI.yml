name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # 👈 CLAVE: Solo se ejecuta si tocás código del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-central1 # Ajustala a la región de tu agente si no es us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Autenticación con Google Cloud usando Workload Identity Federation (WIF)
    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}' # 👈 Tus secretos de WIF
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    # Despliegue del agente usando el SDK de Vertex AI / Agent Garden
    - name: Deploy Agent to Vertex AI
      run: |
        echo "Instalando dependencias de Vertex AI y componentes beta de gcloud..."
        pip install google-cloud-aiplatform
        # Aseguramos la instalación del componente beta de forma no interactiva
        gcloud components install beta --quiet

        echo "Actualizando definición de emilAI en Agent Garden..."
        # Le clavamos el --quiet al final para que no pida confirmación de nada
        gcloud beta ai agents versions create \
          --agent="emilAI" \
          --project="${{ env.PROJECT_ID }}" \
          --location="${{ env.REGION }}" \
          --local-dir="./emilAI" \
          --set-default \
          --quiet