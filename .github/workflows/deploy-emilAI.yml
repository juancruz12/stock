name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # Solo se ejecuta si modificás código o configs dentro de la carpeta del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-east1
  RESOURCE_NAME: "projects/114519320182/locations/us-east1/reasoningEngines/9007797389066502144"

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy Agent to Vertex AI
      run: |
        # 1. Instalar pip, vertexai y el gestor 'uv' que pide el Makefile
        python -m pip install --upgrade pip
        pip install --upgrade google-cloud-aiplatform vertexai
        
        echo "Instalando 'uv' (Python package manager)..."
        curl -LsSf https://astral.sh/uv/install.sh | sh
        # Agregamos uv al PATH de la sesión de ejecución actual
        . $HOME/.local/bin/env

        # 2. Moverse a la carpeta del agente y ejecutar
        cd emilAI
        
        echo "Ejecutando el despliegue nativo de Agent Garden..."
        make backend
      env:
        PROJECT_ID: ${{ env.PROJECT_ID }}
        REGION: us-central1
        RAG_CORPUS_ID: "6464794119788036096"