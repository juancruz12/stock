name: Deploy emilAI Agent to Vertex AI

on:
  push:
    branches: [ main ]
    paths:
      - 'emilAI/**' # Solo se ejecuta si modificás código o configs dentro de la carpeta del agente

env:
  PROJECT_ID: project-76b5e515-21a1-4a89-82f
  REGION: us-east1
  RESOURCE_NAME: "projects/114519320182/locations/us-east1/reasoningEngines/9007797389066502144"

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
        service_account: '${{ secrets.GCP_SA_EMAIL }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy Agent to Vertex AI
      run: |
        # 1. Instalar dependencias necesarias para el Makefile (si es que usa pip/requirements)
        python -m pip install --upgrade pip
        if [ -f emilAI/requirements.txt ]; then pip install -r emilAI/requirements.txt; fi
        pip install --upgrade google-cloud-aiplatform vertexai

        # 2. Moverse a la carpeta donde está el Makefile y ejecutar el despliegue
        # Reemplazá 'emilAI' por la ruta exacta donde esté tu Makefile si no está en la raíz
        cd emilAI
        
        echo "Ejecutando el despliegue nativo de Agent Garden..."
        make backend
      env:
        PROJECT_ID: ${{ env.PROJECT_ID }}
        REGION: ${{ env.REGION }}
        # Si el Makefile necesita variables de entorno específicas (como el ID del corpus), pasalas acá:
        # DATASTORE_ID: "tu-datastore-id"